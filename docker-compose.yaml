services:
  aniworld:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Keep downloads on the host so they don’t disappear when the container is recreated
      - ./Downloads:/app/Downloads
    # If you hit permission issues on Linux, uncomment and run with UID/GID set
    # user: "${UID:-1000}:${GID:-1000}"
    # For now, just serve the Downloads folder over HTTP (until the real web UI exists)
    command: ["python", "-m", "http.server", "8080", "--directory", "/app/Downloads"]
    restart: unless-stopped